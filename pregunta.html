<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres salir conmigo? ❤️</title>

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:linear-gradient(135deg,#ffd6e7,#fff4f8);

}

.contenedor{

    text-align:center;

}

h1{

    font-size:60px;
    color:#ff4f87;

}

h2{

    margin-top:20px;
    margin-bottom:60px;
    font-size:35px;
    color:#555;

}

#si,#no{

    padding:18px 40px;
    font-size:22px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:.2s;

}

#si{

    background:#ff4f87;
    color:white;
    margin-right:20px;

}

#no{

    background:#555;
    color:white;

}

    </style>

</head>

<body>

<div class="contenedor">

<h1>Liz ❤️</h1>

<h2>¿Quieres salir conmigo?</h2>

<button id="si">❤️ Sí ❤️</button>

<button id="no">🙈 No</button>

</div>

<script src="script.js"></script>

</body>
</html>
