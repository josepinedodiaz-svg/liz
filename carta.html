<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Liz ❤️</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#ffe6ef,#fff9fc);
            overflow:hidden;
            font-family:Arial, Helvetica, sans-serif;
        }

        .card{

            width:380px;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 25px 60px rgba(0,0,0,.18);

            transform:translateY(100px);
            opacity:0;

            animation:subir 1.2s forwards;

        }

        @keyframes subir{

            to{

                transform:translateY(0);
                opacity:1;

            }

        }

        h1{

            color:#ff4f87;
            text-align:center;
            margin-bottom:30px;

        }

        #texto{

            font-size:20px;
            line-height:35px;
            color:#555;
            min-height:250px;

        }

        button{

            display:none;

            margin:auto;
            margin-top:30px;

            padding:15px 40px;

            border:none;

            background:#ff4f87;

            color:white;

            font-size:18px;

            border-radius:40px;

            cursor:pointer;

            transition:.3s;

        }

        button:hover{

            transform:scale(1.08);

        }

    </style>

</head>

<body>

<div class="card">

<h1>Para Liz ❤️</h1>

<p id="texto"></p>

<button id="continuar">

Continuar ❤️

</button>

</div>

<script>

const mensaje=`Hola Liz ❤️

Desde que vi el brillo de tus ojos y tu sonrisa hermosa se sembro una pregunta muy importate en mi corazon y por eso quise hacer algo diferente por que hay una pregunta que quiero hacerte desde hace tiempo....`;

const texto=document.getElementById("texto");

const boton=document.getElementById("continuar");

let i=0;

function escribir(){

    if(i<mensaje.length){

        texto.innerHTML+=mensaje.charAt(i);

        i++;

        setTimeout(escribir,40);

    }

    else{

        boton.style.display="block";

    }

}

escribir();

boton.onclick=()=>{

    window.location.href="pregunta.html";

}

</script>

</body>

</html>
